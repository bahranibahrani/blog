<style>
  /* Paragraf rata kiri-kanan (justify) tanpa indentasi */
  .post-content p {
    text-align: justify;
  }

  /* ========================================
     ENHANCED PROFILE MODE STYLES
     ======================================== */

  /* Profile image - polished look */
  .profile img {
    border-radius: 50%;
    object-fit: cover;
    object-position: center;
    border: 4px solid transparent;
    background-origin: border-box;
    background-clip: padding-box, border-box;
    box-shadow: 
      0 4px 15px rgba(0, 0, 0, 0.1),
      0 0 0 2px var(--primary);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: float 6s ease-in-out infinite;
  }

  .profile img:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 
      0 12px 30px rgba(0, 0, 0, 0.2),
      0 0 0 3px var(--link);
  }

  /* Floating animation for profile image */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* Profile title - clean and bold */
  .profile h1 {
    color: var(--primary);
    font-size: 2.2em;
    font-weight: 700;
    margin-top: 10px;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(128, 128, 128, 0.15);
  }

  /* Subtitle - typewriter style */
  .profile span {
    font-size: 1.1em;
    color: var(--secondary);
    letter-spacing: 0.5px;
    position: relative;
    display: inline-block;
  }

  /* Social icons - hover effect */
  .profile .social-icons {
    margin-top: 5px;
    gap: 12px;
  }

  .profile .social-icons a {
    transition: all 0.3s ease;
    padding: 8px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .profile .social-icons a:hover {
    transform: translateY(-4px) scale(1.15);
    background: var(--tertiary);
    box-shadow: 0 4px 15px rgba(128, 128, 128, 0.2);
  }

  .profile .social-icons a svg {
    width: 22px;
    height: 22px;
  }

  /* Buttons - modern glassmorphism style */
  .profile .buttons {
    margin-top: 10px;
    gap: 8px;
  }

  .profile .button {
    background: var(--tertiary);
    border-radius: 12px;
    margin: 4px;
    padding: 8px 16px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(128, 128, 128, 0.15);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .profile .button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    transition: left 0.5s;
  }

  .profile .button:hover::before {
    left: 100%;
  }

  .profile .button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 25px rgba(128, 128, 128, 0.25);
    border-color: var(--link);
  }

  .profile .button:active {
    transform: scale(0.96);
  }

  .profile .button-inner {
    font-weight: 500;
    font-size: 0.95em;
    letter-spacing: 0.3px;
  }

  /* Fade-in animation for profile elements */
  .profile_inner {
    animation: fadeInUp 0.8s ease-out;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Staggered animation for children */
  .profile_inner > *:nth-child(1) { animation-delay: 0s; }
  .profile_inner > *:nth-child(2) { animation: fadeInUp 0.8s ease-out 0.1s both; }
  .profile_inner > *:nth-child(3) { animation: fadeInUp 0.8s ease-out 0.2s both; }
  .profile_inner > *:nth-child(4) { animation: fadeInUp 0.8s ease-out 0.3s both; }
  .profile_inner > *:nth-child(5) { animation: fadeInUp 0.8s ease-out 0.4s both; }

  /* Responsive adjustments */
  @media screen and (max-width: 768px) {
    .profile img {
      transform: scale(0.85);
      animation: floatMobile 6s ease-in-out infinite;
    }

    @keyframes floatMobile {
      0%, 100% { transform: scale(0.85) translateY(0px); }
      50% { transform: scale(0.85) translateY(-6px); }
    }

    .profile h1 {
      font-size: 1.7em;
    }

    .profile span {
      font-size: 0.95em;
    }

    .profile .buttons {
      max-width: 300px;
    }
  }

  /* ========================================
     IMAGE LIGHTBOX / ZOOM
     ======================================== */

  /* Make post images look clickable */
  .post-content img {
    cursor: zoom-in;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border-radius: 8px;
  }

  .post-content img:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
  }

  /* Lightbox overlay */
  .lightbox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    cursor: zoom-out;
  }

  .lightbox-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .lightbox-overlay img {
    max-width: 95vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: default;
  }

  .lightbox-overlay.active img {
    transform: scale(1);
  }

  /* Zoom hint badge */
  .lightbox-overlay .zoom-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.85em;
    padding: 6px 16px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* Close button */
  .lightbox-overlay .lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    color: rgba(255, 255, 255, 0.8);
    font-size: 2em;
    cursor: pointer;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    transition: background 0.2s, color 0.2s;
    line-height: 1;
    font-weight: 300;
  }

  .lightbox-overlay .lightbox-close:hover {
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
  }

  /* Respect reduced motion preference */
  @media (prefers-reduced-motion: reduce) {
    .profile img,
    .profile img:hover {
      animation: none;
      transition: none;
    }

    .profile h1 {
      animation: none;
    }

    .profile_inner,
    .profile_inner > * {
      animation: none;
    }

    .profile .button,
    .profile .social-icons a {
      transition: none;
    }
  }
</style>
