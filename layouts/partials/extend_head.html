<style>
  /* Paragraf rata kiri-kanan (justify) tanpa indentasi */
  .post-content p {
    text-align: justify;
  }

  /* ========================================
     ENHANCED PROFILE MODE STYLES
     ======================================== */

  /* Profile image - animated border glow */
  .profile img {
    border-radius: 50%;
    border: 3px solid var(--primary);
    box-shadow: 0 0 20px rgba(128, 128, 128, 0.3);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: float 6s ease-in-out infinite;
  }

  .profile img:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 0 15px 35px rgba(128, 128, 128, 0.4);
    border-color: var(--link);
  }

  /* Floating animation for profile image */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* Profile title - clean and bold */
  .profile h1 {
    color: var(--primary);
    font-size: 2.2em;
    font-weight: 700;
    margin-top: 10px;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(128, 128, 128, 0.15);
  }

  /* Subtitle - typewriter style */
  .profile span {
    font-size: 1.1em;
    color: var(--secondary);
    letter-spacing: 0.5px;
    position: relative;
    display: inline-block;
  }

  /* Social icons - hover effect */
  .profile .social-icons {
    margin-top: 5px;
    gap: 12px;
  }

  .profile .social-icons a {
    transition: all 0.3s ease;
    padding: 8px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .profile .social-icons a:hover {
    transform: translateY(-4px) scale(1.15);
    background: var(--tertiary);
    box-shadow: 0 4px 15px rgba(128, 128, 128, 0.2);
  }

  .profile .social-icons a svg {
    width: 22px;
    height: 22px;
  }

  /* Buttons - modern glassmorphism style */
  .profile .buttons {
    margin-top: 10px;
    gap: 8px;
  }

  .profile .button {
    background: var(--tertiary);
    border-radius: 12px;
    margin: 4px;
    padding: 8px 16px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(128, 128, 128, 0.15);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .profile .button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    transition: left 0.5s;
  }

  .profile .button:hover::before {
    left: 100%;
  }

  .profile .button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 25px rgba(128, 128, 128, 0.25);
    border-color: var(--link);
  }

  .profile .button:active {
    transform: scale(0.96);
  }

  .profile .button-inner {
    font-weight: 500;
    font-size: 0.95em;
    letter-spacing: 0.3px;
  }

  /* Fade-in animation for profile elements */
  .profile_inner {
    animation: fadeInUp 0.8s ease-out;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Staggered animation for children */
  .profile_inner > *:nth-child(1) { animation-delay: 0s; }
  .profile_inner > *:nth-child(2) { animation: fadeInUp 0.8s ease-out 0.1s both; }
  .profile_inner > *:nth-child(3) { animation: fadeInUp 0.8s ease-out 0.2s both; }
  .profile_inner > *:nth-child(4) { animation: fadeInUp 0.8s ease-out 0.3s both; }
  .profile_inner > *:nth-child(5) { animation: fadeInUp 0.8s ease-out 0.4s both; }

  /* Responsive adjustments */
  @media screen and (max-width: 768px) {
    .profile img {
      transform: scale(0.85);
      animation: floatMobile 6s ease-in-out infinite;
    }

    @keyframes floatMobile {
      0%, 100% { transform: scale(0.85) translateY(0px); }
      50% { transform: scale(0.85) translateY(-6px); }
    }

    .profile h1 {
      font-size: 1.7em;
    }

    .profile span {
      font-size: 0.95em;
    }

    .profile .buttons {
      max-width: 300px;
    }
  }

  /* Respect reduced motion preference */
  @media (prefers-reduced-motion: reduce) {
    .profile img,
    .profile img:hover {
      animation: none;
      transition: none;
    }

    .profile h1 {
      animation: none;
    }

    .profile_inner,
    .profile_inner > * {
      animation: none;
    }

    .profile .button,
    .profile .social-icons a {
      transition: none;
    }
  }
</style>
